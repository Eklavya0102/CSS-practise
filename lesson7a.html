<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tweet sample</title>

    <style>
        .profile{
            width: 45px;
            height: 45px;
            object-fit: cover;
            object-position: left;
            border: none;
            border-radius: 25px;
            margin-top: 40px;
            margin-left: 20px;
            vertical-align: middle;
        }
        .text-inp{
            border: none;
            border-radius: 30px;
            font-size: 16px;
            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 12px;
            margin-top: 40px;
            margin-left: 5px;
            width: 280px;
            vertical-align: middle;
            box-shadow: 0px 1px 5px rgba(0, 0, 0, 0.25);
        }

        button{
            background-color: rgb(29, 155, 240);
            color: white;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 18px;
            padding-left: 18px;
            border: none;
            border-radius: 25px;
            vertical-align: middle;
            margin-top: 40px;
            font-size: 16px;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <img class="profile" src="https://supersimple.dev/exercises/youtube/thumbnails/thumbnail-1.webp" alt="profile-picture">

    <input class="text-inp" type="text" placeholder="What's happening ?">

    <button>
        tweet
    </button>
    
</body>
</html>
