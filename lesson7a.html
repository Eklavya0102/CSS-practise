<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tweet sample</title>

    <style>
        .profile {
            width: 45px;
            height: 45px;
            object-fit: cover;
            object-position: left;
            border: none;
            border-radius: 25px;
            margin-left: 20px;
            vertical-align: middle;
        }

        .text-inp {
            border: none;
            font-size: 16px;
            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 12px;
            margin-left: 5px;
            width: 280px;
            vertical-align: middle;
        }

        button {
            background-color: rgb(29, 155, 240);
            color: white;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 18px;
            padding-left: 18px;
            border: none;
            border-radius: 25px;
            vertical-align: middle;
            font-size: 16px;
            font-weight: bold;
        }

        .tw-div {
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.3);
            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 12px;
            padding-right: 12px;
            width: 450px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="tw-div">
        <img class="profile" src="https://supersimple.dev/exercises/youtube/thumbnails/thumbnail-1.webp"
            alt="profile-picture">

        <input class="text-inp" type="text" placeholder="What's happening ?">

        <button>
            tweet
        </button>
    </div>
</body>

</html>
