<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>google</title>
    <style>
    div{
        text-align: center;
    }
    .logo{
        width: 300px;
        margin-top: 10px;
        margin-bottom: 10px;
       
    }
    .search{
        font-size: 18px;
        height: 50px;
        padding-left: 20px;
        width: 300px;
        padding-right: 300px;
        border: none;
        border-radius: 25px;
        box-shadow: 0px 1px 6px rgba(0, 0, 0, 0.3);
    }
    .google-button {
        font-weight: bold;
        height: 36px;
        padding-left: 16px;
        padding-right: 16px;
        border: none;
        margin-top: 20px;
    }
    .search-button{
        margin-right: 10px;
    }
    </style>
    
</head>
<body>
    <div>
    <img class="logo" src="logog.png" alt="google_logo">
    </div>

    
    <div>
    <input class="search" type="text" placeholder="Search Google or Type an URL">
    </div>

    <div>
        <button class="google-button search-button">Google Search</button>
        <button class="google-button">I'm Feeling Lucky</button>
    </div>

    
</body>
</html>
