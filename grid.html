<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid_Pr</title>
</head>

<body>

    <head></head>

    <body>
        <div 
        style="display: grid;
        grid-template-columns: 100px 100px;
        ">
            <div style="background-color: lightyellow;"> div 1</div>
            <div style="background-color: rgb(49, 144, 233);">div 2</div>
        </div>

        <div 
        style="display: grid;
        grid-template-columns: 100px 100px 200px;
        margin-top: 20px;
        ">
            <div style="background-color: lightyellow;"> div 1</div>
            <div style="background-color: rgb(49, 144, 233);">div 2</div>
            <div style="background-color: pink;">div 3
                <p>hello</p>
            </div>
        </div>

        <div 
        style="display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        margin-top: 20px;
        column-gap: 15px;
        row-gap: 40px;
        ">
            <div style="background-color: lightyellow; height: 200px;"> div 1</div>
            <div style="background-color: rgb(49, 144, 233); height: 200px;">div 2</div>
            <div style="background-color: pink; height: 200px;">div 3
            </div>
            <div style="background-color: pink; height: 200px;"> div 1</div>
            <div style="background-color: lightyellow; height: 200px;">div 2</div>
            <div style="background-color: rgb(80, 80, 255); height: 200px;"> div 1</div>
        </div>
    </body>
</body>

</html>
