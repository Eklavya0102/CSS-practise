<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>overlay modal</title>
    <style>
        .sidebar{
            background-color: lightblue;
            position: fixed;
            right: 0px;
            top: 0px;
            bottom: 0px;
            width: 100px;
        }
        .overlay{
            background-color: rgb(0,0,0,0.4);
            position: fixed;
            top: 0px;
            bottom: 0px;
            left: 0px;
            right: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal{
            background-color: white;
            padding-bottom: 15px;
            padding-top: 15px;
            padding-left: 15px;
            padding-right: 15px;
            width: 350px;
            border: none;
            border-radius: 5px;
            box-shadow: 0px 1px 5px rgba(0,0,0,0.5);
        }
        .title{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 18px;
            font-weight: bold;
            margin-left: 5px;
            margin-top: 3px;
            margin-bottom: 10px;
        }
        .content{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            color: grey;
            margin-left: 5px;
        }
        button{
            margin-top: 48px;
            margin-left: 5px;
        }j
    </style>
</head>
<body>
    <div class="sidebar"> Sidebar</div>
    <div class="overlay">
        <div class="modal">
            <div class="title">Title</div>
            <div class="content">content</div>
            <button>
                close
            </button>
        </div>
    </div>

    
</body>
</html>
