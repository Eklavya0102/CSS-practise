<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            color: rgb(0, 113, 113);
            font-size: 20px;
        }
        h2{
            color: black;
            font-size: 35px;
        }
        .price{
            color: rgb(0, 118, 0);
            font-weight: bold;
            font-size: 25px;
        }
        .delivery{
            color: black;
            font-size: 18px;
        }
        .cart{
            background-color: yellow;
            color: rgb(15, 14, 14);
            border: none;
            border-radius: 25px;
            height: 36px;
            width: 115px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .cart:hover{
            transform: scale(1.08);
        }
        .cart:active{
            transform: scale(0.9);
            opacity: 0.8;
        }
        .Buy{
            background-color: rgb(38, 180, 38);
            color: white;
            border: none;
            border-radius: 3px;
            height: 36px;
            width: 115px;
            margin-left: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .Buy:hover{
            transform: scale(1.08);
            opacity: 0.8;

        }
        .Buy:active{
            transform: scale(0.9);
        }

    </style>
</head>
<body>
    <header></header>
    <main>
        <a href="#">Back to amazon</a>
        <h2>Nike Black Running Shoes</h2>
        <p class="price">$39 - in stock</p>
        <p class="delivery">Free delivery tomorrow</p>

        <button class="cart">Add to Cart</button>
        <button class="Buy">Buy Now</button>
    </main>
</body>
</html>
