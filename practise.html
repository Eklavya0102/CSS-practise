<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>just practise</title>
    <style>
        .sub-btn{
            background-color: rgb(255, 0, 0);
            color: white;
            border: none;
            border-radius: 3px;
            height: 35px;
            width: 105px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: background-color 150ms, color 150ms;
        }

        .sub-btn:hover{
            background-color: rgb(60, 190, 226);
            color: rgb(255, 0, 0);
        }
        .sub-btn:active{
            opacity: 0.7;
        }

        .join-btn{
            background-color: white;
            border-color: rgb(15, 15, 225);
            color: rgb(60, 60, 242);
            /* border: none; */
            border-radius: 5px;
            height: 36px;
            width: 105px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 15px;
            font-weight: bold;
            transition: background-color 150ms, color 150ms, transform 150ms;
            
        }

        .join-btn:hover{
            background-color: rgb(76, 76, 242);
            color: white;
            transform: scale(1.08);
        }

        .join-btn:active{
            opacity: 0.7;
        }

        .tweet-btn{
            background-color: rgb(53, 130, 230);
            color: white;
            border: none;
            border-radius: 25px;
            height: 36px;
            width: 74px;
            font-weight: bold;
            font-size: 15px;
            margin-left: 8px;
            cursor: pointer;
            transition: box-shadow 200ms;
        }

        .tweet-btn:hover{
            box-shadow: -1px 3px 5px rgba(19, 3, 3, 0.5);
            opacity: 0.1px;
        }
        .uber{
            background-color: rgb(0, 0, 0);
            color: white;
            border:none;
            height: 40px;
            width: 115px;
            margin-left: 10px;
            cursor: pointer;
            transition: opacity 150ms;
        }
        .uber:hover{
            opacity: 0.8
        }
        .amazon{
            background-color: rgb(255, 216, 20);
            color: black;
            border: none;
            border-radius: 40px;
            height: 36px;
            width: 180px;
            font-size: 15px;
            margin-left: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <button class="sub-btn">subscribe</button>
    <button class="join-btn">Join</button>
    <button class="tweet-btn">Tweet</button>
    <button class="uber">Request Now</button>
    <button class="amazon">Add to Cart</button>
    
</body>
</html>
