<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9f-div element practice</title>
    <style>
        p{
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 0px;
            margin-bottom: 0px;
        }
        .img_{
            width: 170px;
            height: 150px;
            object-fit: cover;
            object-position: left;
        }

        .img_1{
            width: 170px;
            height: 150px;
            object-fit: cover;
            object-position: right;
        }
        .card{
            width: 170px;
            display: inline-block;
            border-style: solid;
            border: none;
            box-shadow: 0px 0px 6px rgba(0, 0, 0, 0.25);
            margin-right: 5px;
        }
        .add_friend{
            height: 32px;
            width: 100px;
            margin-left: 4px;
            margin-bottom: 10px;
            border: none;
            border-radius: 6px;
            background-color: rgb(86, 86, 244);
            color: white;
        }
        .Title{
            margin-left: 4px;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 0px;
        }
        .info{
            margin-left: 4px;
            margin-top: 3px;
            margin-bottom: 10px;
            font-size: 13px;
            color: grey;
        }

        .pp{
            display: inline-block;
            vertical-align: top;
            margin-left: 5px;
        }

        .mutual{
            display: inline-block;
            vertical-align: top;
        }
        .ch-image{
            width: 25px;
            border-radius: 15px;
        }
        .thumbnail{
            margin-bottom: 5px;
        }
        .title-row{
            margin-bottom: 5px;
        }
        .btn{
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="thumbnail">
            <img class="img_" src="https://supersimple.dev/exercises/youtube/thumbnails/thumbnail-1.webp" alt="cardimg">
        </div>
        <div class="more-info">
            <div class="title-row">
                <p class="Title">hello223</p>
            </div>
            <div class="pp">
                <img class="ch-image" src="https://supersimple.dev/exercises/youtube/channel-profile-pics/channel-1.jpeg" alt="">
            </div>
            <div class="mutual">
                <p class="info">2 mutual friends</p>
            </div>   
            <div class="btn">
                <button class="add_friend">
                    Add Friend
                </button>
            </div>        
        </div>       
    </div>

    <div class="card">
        <div class="thumbnail">
            <img class="img_1" src="https://supersimple.dev/exercises/youtube/thumbnails/thumbnail-1.webp" alt="cardimg">
        </div>
        <div class="more-info">
            <div class="title-row">
                <p class="Title">Sundar.P</p>
            </div>
            <div class="pp">
                <img class="ch-image" src="https://supersimple.dev/exercises/youtube/channel-profile-pics/channel-1.jpeg" alt="">
            </div>
            <div class="mutual">
                <p class="info">4 mutual friends</p>
            </div>   
            <div class="btn">
                <button class="add_friend">
                    Add Friend
                </button>
            </div>        
        </div>       
    </div>

    <div class="card">
        <div class="thumbnail">
            <img class="img_" src="https://supersimple.dev/exercises/youtube/thumbnails/thumbnail-1.webp" alt="cardimg">
        </div>
        <div class="more-info">
            <div class="title-row">
                <p class="Title">hello223</p>
            </div>
            <div class="pp">
                <img class="ch-image" src="https://supersimple.dev/exercises/youtube/channel-profile-pics/channel-1.jpeg" alt="">
            </div>
            <div class="mutual">
                <p class="info">3 mutual friends</p>
            </div>   
            <div class="btn">
                <button class="add_friend">
                    Add Friend
                </button>
            </div>        
        </div>       
    </div>


</body>
</html>
