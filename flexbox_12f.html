<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox_12f</title>
    <style>
        body{
            margin-top: 0px;
            margin-left: 0px;
            margin-right: 0px;
        }

        .flex{
            height: 50px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            background-color: rgb(120, 82, 178);
        }

        .home-btn{
            background-color: rgb(120, 82, 178);
            color: white;
            font-weight: bold;
            border: none;
            padding-top: 9px;
            padding-bottom: 9px;
            padding-right: 16px;
            padding-left: 16px;
        }
        .download-btn{
            background-color: rgb(120, 82, 178);
            color: white;
            border-width: 1px;
            border-color: white;
            border-style: solid;
            padding-left: 10px;
            padding-right: 10px;
            padding-top: 8px;
            padding-bottom: 8px;
            margin-right: 10px;
        }

        .search{
            font-size: 16px;
            width: 475px;
            padding-left: 20px;
            padding-right: 30px;
            padding-top: 8px;
            padding-bottom: 8px;
            border: none;
            border-radius: 25px;

        }

    </style>
</head>
<body>
    <div class="flex">
        <div class="left-section">
            <button class="home-btn">Home</button>
        </div>
        <div class="middle-section">
            <input class="search" type="text" placeholder="Sarch">
        </div>
        <div class="right-section">
            <button class="download-btn">Download</button>
        </div>
    </div>
    
</body>
</html>
