    <title>G12</title>
    <style>
        p{
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 0px;

        }
        .card{
            display: flex;
            flex-direction: row;
            align-items: center;
            margin-bottom: 40px;
            /* justify-content: space-between; */

        }
        .profile-section{

        }

        .btn{

        }
        .follow-btn{
            background-color: rgb(64, 64, 223);
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 23px;
            padding-right: 23px;
        }

        .profile_picture{
            width: 100%;
            border-radius: 35px;
        }
        .name{
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .description{
            font-size: 16px;
            color: rgb(96, 96, 96)
        }
    </style>

</head>
