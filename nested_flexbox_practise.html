<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 13 a css */
        .a13{
            display: flex;
            flex-direction: row;
        }
        .box1{
            width: 100px;
            background-color: lightblue;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .item1{
            background-color: black;
            color: white;
        }


        /* 13 b css */
        .b13{
            display: flex;
            flex-direction: row;
            margin-top: 100px;
        }
        .column2{
            background-color: lightblue;
            width: 200px;
        }
        .row2{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .row2-item{
            background-color: black;
            color: white;
        }


    </style>
</head>
<body>
    <div class="a13">
        <div class="box1">
            <p class="item1">Item 1</p>
        </div>
        <div style="width: 200px; background-color: lightpink;"></div>
    </div>

    <!-- 13b Html -->
    <div class="b13">
        <div style="background-color: lightpink; width: 100px;"></div>
        <div class="column2">
            <div class="row1">row 1</div>
            <div class="row2">
                <div class="row2-item">row 2</div>
                <div class="row2-item">row 2</div>
            </div>

            
        </div>
    </div>

    
</body>
</html>
