<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position_exercise</title>
    <style>
        .overlay{
            background-color: rgba(0,0,0,0.4);
            position: fixed;
            top: 0px;
            bottom: 0px;
            left: 0px;
            right: 0px;

            display: flex;
            justify-content: center;
            align-items: top-start;

        }
        .relative-div{
            background-color: white;
            width: 320px;
            height: 180px;
            border-top-left-radius: 3px;
            border-bottom-left-radius: 3px;
            border-bottom-right-radius: 3px;

            margin-top: 30px;
            position: relative;
        }
        .close-btn{
            position: absolute;
            top: -7px;
            left: -8px;

            background-color: rgb(23, 23, 23);
            color: white;
            padding-top: 2px;
            padding-bottom: 2px;
            padding-left: 6px;
            padding-right: 6px;
            border-radius: 20px;
        }
        p{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 80px;
        }
    </style>

</head>
<body>
    <div class="overlay">
        <div class="relative-div">
            <p>Hello MOTO !!</p>
            <div class="close-btn">X</div>
        </div>
    </div>
</body>
</html>
