<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox_practise</title>
</head>
<body>
    <div style="
        display: flex; 
        flex-direction: row;
        ">
        <div style="background-color: lightblue;">div 1 hhhk</div>
        <div style="background-color: lightpink;">div 2 <p>hello</p>
        </div>
    </div>

    <div style="
        display: flex; 
        flex-direction: row;
        margin-top: 20px;
        ">
        <div style="background-color: lightblue; width: 100px;">100px</div>
        <div style="background-color: lightpink; flex: 1;">flex : 1fr
        </div>
    </div>

    <div style="
        display: flex; 
        flex-direction: row;
        margin-top: 20px;
        ">
        <div style="background-color: lightblue; width: 100px;">100px</div>
        <div style="background-color: lightpink; flex: 1;">flex : 1fr
        </div>
        <div style="background-color: lightblue; flex: 2;">Flex 2 (takes twice the space of flex 1) </div>
    </div>


    <div style="
        height: 70px;
        border-style: solid;
        border-color: grey;
        border-width: 1px;
        margin-top: 20px;

        display: flex;
        flex-direction: row;
        justify-content: center;
        ">
        <div style="background-color: lightblue; width: 100px;">100px</div>
        <div style="background-color: lightpink; width: 100px;">100px
        </div>
        <div style="background-color: lightblue; width: 100px;">100px </div>
    </div>


    <div style="
        height: 70px;
        border-style: solid;
        border-color: grey;
        border-width: 1px;
        margin-top: 20px;

        display: flex; 
        flex-direction: row;
        justify-content: space-between;
        
        ">
        <div style="background-color: lightblue; width: 100px;">100px</div>
        <div style="background-color: lightpink; width: 100px;">100px
        </div>
        <div style="background-color: lightblue; width: 100px;">100px </div>
    </div>

    <div style="
        height: 70px;
        border-style: solid;
        border-color: grey;
        border-width: 1px;
        margin-top: 20px;

        display: flex; 
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        
        ">
        <div style="background-color: lightblue; width: 100px;">100px</div>
        <div style="background-color: lightpink; width: 100px;">100px
        </div>
        <div style="background-color: lightblue; width: 100px;">100px </div>
    </div>


    
</body>
</html>
