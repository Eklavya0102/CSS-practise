<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .one{
            background-color: rgb(58, 58, 231);
            color: white;
            border: none;
            border-radius: 3px;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 25px;
            padding-right: 25px;
            font-size: 20px;
            margin-left: 10px;
            margin-right: 10px;
            cursor: pointer;
            transition: padding 0.3s, margin 0.3s, transform 0.3s, opacity 0.3s;
        }
        .one:hover{
            padding-left: 35px;
            padding-right: 35px;
            margin-left: 0px;
            margin-right: 0px; 

        }
        .one:active{
            transform: scale(0.8);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <button class="one">one</button>
    <button class="one">Two</button>
    <button class="one">three</button>


</body>
</html>
